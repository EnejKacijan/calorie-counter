<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progress · Calorie Counter</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand-mark">
          <span class="brand-icon sidebar-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4.5 12.2c2.8-6.1 8.4-8.6 14.8-6.5-.6 6.8-5.1 11.7-12 12.6 1.5-2.7 3.6-4.7 6.5-6.1" /><path d="M12 8.4v6.4" /><path d="M8.8 11.6h6.4" /></svg></span>
          <strong>Daily Fuel</strong>
          <button class="sidebar-toggle" id="sidebarToggle" type="button" title="Toggle sidebar" aria-label="Toggle sidebar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6" /></svg></button>
        </div>

        <nav class="side-nav" aria-label="App navigation">
          <a href="index.html"><span class="sidebar-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 10.5 12 4l8 6.5" /><path d="M6.5 9.5V20h11V9.5" /><path d="M10 20v-6h4v6" /></svg></span><b>Calorie Counter</b></a>
          <a class="is-active" href="progress.html"><span class="sidebar-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 19h16" /><path d="M6.5 16.5 10 13l3 2.5 4.5-7" /><path d="M17.5 8.5h-4" /><path d="M17.5 8.5v4" /></svg></span><b>Progress</b></a>
          <a href="profile.html"><span class="sidebar-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="7.5" r="4.2" /><path d="M4.5 21a7.5 7.5 0 0 1 15 0Z" /></svg></span><b>Profile</b></a>
        </nav>

        <div class="profile-card">
          <div class="avatar" aria-hidden="true">
            <svg viewBox="0 0 48 48">
              <circle cx="24" cy="14" r="10" />
              <path d="M8 44a16 16 0 0 1 32 0Z" />
            </svg>
          </div>
          <div>
            <strong id="profileSummary">Your plan</strong>
            <small id="profileMeta">Goal</small>
          </div>
        </div>

        <button class="logout-button" id="logoutButton" type="button"><span class="sidebar-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 20H6.5A2.5 2.5 0 0 1 4 17.5v-11A2.5 2.5 0 0 1 6.5 4H9" /><path d="M14 8l4 4-4 4" /><path d="M18 12H9" /></svg></span> <b>Log out</b></button>
      </aside>

      <section class="main-content">
        <section class="topbar">
          <div class="topbar-heading">
            <span class="brand-icon topbar-brand-icon sidebar-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4.5 12.2c2.8-6.1 8.4-8.6 14.8-6.5-.6 6.8-5.1 11.7-12 12.6 1.5-2.7 3.6-4.7 6.5-6.1" /><path d="M12 8.4v6.4" /><path d="M8.8 11.6h6.4" /></svg></span>
            <div>
              <p class="eyebrow">Body weight</p>
              <h1>Progress</h1>
            </div>
          </div>
          <a class="text-button" href="index.html">Calorie Counter</a>
        </section>

        <section class="progress-hero progress-panel">
          <div class="progress-hero-copy">
            <div>
              <p class="label" id="progressGoalLabel">Goal progress</p>
              <h2 id="progressSummary">0% to goal</h2>
            </div>
            <span class="progress-badge" id="progressTrendBadge">Trend</span>
          </div>
          <div class="progress-meter" aria-label="Progress to goal">
            <span id="progressMeterFill"></span>
          </div>
          <div class="progress-stats" id="progressStats"></div>
        </section>

        <section class="progress-layout">
          <section class="progress-panel">
            <div class="panel-title">
              <div>
                <p class="label">Weight trend</p>
                <h2>Chart</h2>
              </div>
              <div class="chart-legend" aria-hidden="true">
                <span><i class="actual-line"></i>Weight</span>
                <span><i class="target-line"></i>Goal</span>
              </div>
            </div>
            <div class="progress-chart" id="progressChart"></div>
          </section>

          <section class="progress-panel">
            <div class="panel-title">
              <div>
                <p class="label">Check-in</p>
                <h2>Log weight</h2>
              </div>
            </div>
            <form class="progress-form" id="progressForm">
              <label>
                Date
                <input id="progressDate" type="date" required />
              </label>
              <label>
                Weight
                <input id="progressWeight" type="number" min="35" max="250" step="0.1" required />
              </label>
              <button type="submit">Save weight</button>
            </form>
            <div class="entry-list" id="progressList"></div>
          </section>
        </section>
      </section>
    </main>

    <template id="entryTemplate">
      <article class="entry-card">
        <div>
          <strong></strong>
          <p></p>
        </div>
        <button type="button" title="Remove" aria-label="Remove">×</button>
      </article>
    </template>

    <script src="progress.js"></script>
  </body>
</html>
